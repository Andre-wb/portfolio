<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Конструктор ТЗ</title>
  <link rel="stylesheet" href="/static/css/tor_builder.css"/>
</head>
<body>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-inner">
      <button class="progress-back-btn" id="progressBackBtn" onclick="goBack()" title="Назад">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="progress-bar-outer">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <span class="progress-label" id="progressLabel">1 / 1</span>
    </div>
  </div>

  <div class="app" id="app">

    <div class="screen" id="quizScreen">
      <div class="card" id="questionCard">
      </div>
    </div>

    <div class="screen hidden" id="resultScreen">
    </div>

  </div>

  <div class="bottom-nav" id="bottomNav">
    <button class="btn btn-ghost" id="backBtn" onclick="goBack()">← Назад</button>
    <button class="btn btn-primary" id="nextBtn" onclick="goNext()">Далее →</button>
  </div>

  <script>
    window.TG_USERNAME = "{{ telegram_username }}";
  </script>
  <script src="/static/js/tor.js"></script>
</body>
</html>
